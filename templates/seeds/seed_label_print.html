<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seed Label - {{ seed.batch_number }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    :root {
      --label-width: 90mm;
      --label-height: 55mm;
    }

    body {
      background: #f4f6f8;
      min-height: 100vh;
    }

    .label-card {
      width: var(--label-width);
      height: var(--label-height);
    }

    .label-content {
      min-width: 0;
      overflow: hidden;
    }

    .qr-square {
      width: 28mm;
      height: 28mm;
    }

    .qr-square img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .seed-name {
      display: block;
      max-width: 100%;
      overflow: hidden;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 1.02rem;
      line-height: 1.15;
    }

    .seed-variety {
      font-size: 0.85rem;
      line-height: 1.1;
    }

    .label-text {
      font-size: 0.82rem;
      line-height: 1.25;
    }

    .batch-value {
      font-size: 0.92rem;
      letter-spacing: 0.01em;
    }

    .upc-icon {
      font-size: 1.15rem;
      line-height: 1;
      vertical-align: middle;
    }

    @page { 
      size: auto; 
      margin: 8mm; 
    }

    @media print {
      body { 
        background: #fff !important; 
      }
      .no-print { 
        display: none !important; 
      }
    }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center p-4">

  <div class="label-card d-flex align-items-center gap-3 bg-white border rounded p-3 shadow-sm">
    
    <div class="qr-square flex-shrink-0 border rounded overflow-hidden bg-white d-flex align-items-center justify-content-center">
      {% if label.qr_code %}
        <img src="{{ label.qr_code.url }}" alt="QR code for {{ label.batch_number }}" class="img-fluid">
      {% else %}
        <span class="text-muted small">No QR</span>
      {% endif %}
    </div>

    <div class="flex-grow-1 label-content">
      <h1 class="seed-name fw-bold mb-2">{{ label.seed_name }}</h1>
      <p class="seed-variety text-success mb-2">{{ label.variety }}</p>
      
      <dl class="mb-0">
        <div class="d-flex label-text mb-1">
          <dt class="text-secondary fw-bold me-2 mb-0">
            <i class="bi bi-upc upc-icon"></i>
          </dt>
          <dd class="text-success fw-bold mb-0 batch-value">{{ label.batch_number }}</dd>
        </div>
        <div class="d-flex label-text">
          <dt class="text-secondary fw-bold me-1 mb-0">Best Before - </dt>
          <dd class="mb-0">{{ label.best_before }}</dd>
        </div>
      </dl>
    </div>

  </div>

  <div class="no-print mt-4 text-center">
    <button type="button" class="btn btn-success btn-lg px-4" onclick="window.print()">
      <i class="bi bi-printer me-2"></i>Print Label
    </button>
  </div>

</body>
</html>
